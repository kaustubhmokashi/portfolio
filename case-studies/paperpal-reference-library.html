    <script>
      const slides = Array.from(document.querySelectorAll(".case-study-slide"));
      const totalEl = document.querySelector("[data-deck-total]");
      const indexEl = document.querySelector("[data-deck-index]");
      const prevBtn = document.querySelector("[data-deck-prev]");
      const nextBtn = document.querySelector("[data-deck-next]");
      const deck = document.querySelector(".case-study-deck-stage");
      let activeIndex = 0;

      const setSlide = (index) => {
        const nextIndex = Math.max(0, Math.min(slides.length - 1, index));
        slides.forEach((slide, slideIndex) => {
          slide.classList.toggle("is-active", slideIndex === nextIndex);
        });
        activeIndex = nextIndex;
        if (indexEl) {
          indexEl.textContent = String(nextIndex + 1).padStart(2, "0");
        }
      };

      if (totalEl) {
        totalEl.textContent = String(slides.length).padStart(2, "0");
      }

      prevBtn?.addEventListener("click", () => setSlide(activeIndex - 1));
      nextBtn?.addEventListener("click", () => setSlide(activeIndex + 1));

      document.addEventListener("keydown", (event) => {
        if (event.key === "ArrowRight" || event.key === "PageDown") {
          event.preventDefault();
          setSlide(activeIndex + 1);
        }
        if (event.key === "ArrowLeft" || event.key === "PageUp") {
          event.preventDefault();
          setSlide(activeIndex - 1);
        }
      });

      let touchStartX = 0;
      let touchActive = false;

      deck?.addEventListener("touchstart", (event) => {
        if (event.touches.length !== 1) return;
        touchActive = true;
        touchStartX = event.touches[0].clientX;
      });

      deck?.addEventListener("touchend", (event) => {
        if (!touchActive) return;
        const touchEndX = event.changedTouches[0]?.clientX || 0;
        const deltaX = touchEndX - touchStartX;
        if (Math.abs(deltaX) > 40) {
          if (deltaX < 0) {
            setSlide(activeIndex + 1);
          } else {
            setSlide(activeIndex - 1);
          }
        }
        touchActive = false;
      });

      const baseWidth = 1920;
      const baseHeight = 1080;
      const resizeDeck = () => {
        if (!deck) return;
        const stageWidth = deck.clientWidth || baseWidth;
        const scale = stageWidth / baseWidth;
        deck.style.setProperty("--deck-scale", scale.toFixed(4));
        deck.style.height = `${baseHeight * scale}px`;
      };

      window.addEventListener("resize", resizeDeck);
      resizeDeck();
    </script>
