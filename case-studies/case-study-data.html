    <script>
      (() => {
      const CASE_STUDY_DECK_WEB_APP_URL =
        "https://script.google.com/macros/s/AKfycbx4Wo4fuWiZGzrm84IV-a8TqlQSekLLXIoiRLH2aKFyRZinyobKYJbBJwEpgEnvyHG3/exec";

      const params = new URLSearchParams(window.location.search);
      const requestedSheet = params.get("sheet") || "Case Studies";
      const requestedRow = Number(params.get("row") || 0);
      const deckStage = document.querySelector("[data-case-study-stage]");
      const deckLoading = document.querySelector("[data-case-study-deck-loading]");
      const prevBtn = document.querySelector("[data-deck-prev]");
      const nextBtn = document.querySelector("[data-deck-next]");
      const fullscreenBtn = document.querySelector("[data-deck-fullscreen]");
      let slides = Array.from(document.querySelectorAll(".case-study-slide"));
      let activeIndex = 0;

      const extractDriveFileId = (url) => {
        if (!url) return "";
        const match = url.match(/[?&]id=([^&]+)/) || url.match(/\/d\/([^/]+)/);
        return match ? match[1] : "";
      };

      const normalizeDriveImageLink = (value) => {
        if (!value) return value;
        const trimmed = value.trim();
        if (!trimmed.includes("drive.google.com")) return trimmed;
        const fileId = extractDriveFileId(trimmed);
        return fileId ? `https://lh3.googleusercontent.com/d/${fileId}` : trimmed;
      };

      const parsePhotoList = (value) =>
        String(value || "")
          .split(/\r?\n|,|\||;/g)
          .map((item) => normalizeDriveImageLink(item.trim()))
          .filter(Boolean);

      const resolveDeckPhotos = (row) => {
        const allPhotos = parsePhotoList(row?.case_study_photos || "");
        if (allPhotos.length > 1) {
          return allPhotos.slice(1);
        }
        if (allPhotos.length === 1) {
          return allPhotos;
        }
        const fallbackImage = normalizeDriveImageLink(row?.project_image_link || "");
        return fallbackImage ? [fallbackImage] : [];
      };

      const setSlide = (index) => {
        const nextIndex = Math.max(0, Math.min(slides.length - 1, index));
        slides.forEach((slide, slideIndex) => {
          slide.classList.toggle("is-active", slideIndex === nextIndex);
        });
        activeIndex = nextIndex;
      };

      const rebuildSlides = (photos, title) => {
        if (!deckStage || !photos.length) return;
        deckStage.innerHTML = "";
        const fragment = document.createDocumentFragment();

        photos.forEach((photo, index) => {
          const slide = document.createElement("article");
          slide.className = `case-study-slide${index === 0 ? " is-active" : ""}`;
          slide.dataset.slide = String(index + 1);

          const image = document.createElement("img");
          image.className = "case-study-slide-image";
          image.src = photo;
          image.alt = `${title || "Case study"} slide ${index + 1}`;

          slide.appendChild(image);
          fragment.appendChild(slide);
        });

        deckStage.appendChild(fragment);
        slides = Array.from(document.querySelectorAll(".case-study-slide"));
        activeIndex = 0;
      };

      const resizeDeck = () => {
        if (!deckStage) return;
        const baseWidth = 1920;
        const baseHeight = 1080;
        const stageWidth = deckStage.clientWidth || baseWidth;
        const scale = stageWidth / baseWidth;
        deckStage.style.setProperty("--deck-scale", scale.toFixed(4));
        deckStage.style.height = `${baseHeight * scale}px`;
      };

      const bindDeckInteractions = () => {
        prevBtn?.addEventListener("click", () => setSlide(activeIndex - 1));
        nextBtn?.addEventListener("click", () => setSlide(activeIndex + 1));
        fullscreenBtn?.addEventListener("click", async () => {
          const fullscreenTarget = document.querySelector(".case-study-deck");
          if (!fullscreenTarget) return;

          try {
            if (document.fullscreenElement) {
              await document.exitFullscreen();
            } else {
              await fullscreenTarget.requestFullscreen();
            }
          } catch (error) {
            console.error("Fullscreen toggle failed", error);
          }
        });

        document.addEventListener("keydown", (event) => {
          if (event.key === "ArrowRight" || event.key === "PageDown") {
            event.preventDefault();
            setSlide(activeIndex + 1);
          }
          if (event.key === "ArrowLeft" || event.key === "PageUp") {
            event.preventDefault();
            setSlide(activeIndex - 1);
          }
        });

        let touchStartX = 0;
        let touchActive = false;

        deckStage?.addEventListener("touchstart", (event) => {
          if (event.touches.length !== 1) return;
          touchActive = true;
          touchStartX = event.touches[0].clientX;
        });

        deckStage?.addEventListener("touchend", (event) => {
          if (!touchActive) return;
          const touchEndX = event.changedTouches[0]?.clientX || 0;
          const deltaX = touchEndX - touchStartX;
          if (Math.abs(deltaX) > 40) {
            if (deltaX < 0) {
              setSlide(activeIndex + 1);
            } else {
              setSlide(activeIndex - 1);
            }
          }
          touchActive = false;
        });
      };

      const loadCaseStudyDeck = async () => {
        if (!requestedRow) {
          document.body.classList.remove("is-case-study-deck-loading");
          deckLoading?.setAttribute("hidden", "");
          resizeDeck();
          bindDeckInteractions();
          return;
        }

        try {
          const response = await fetch(
            `${CASE_STUDY_DECK_WEB_APP_URL}?sheet=${encodeURIComponent(requestedSheet)}`,
            { method: "GET", cache: "no-store" }
          );

          if (!response.ok) {
            throw new Error(`Case study fetch failed with ${response.status}`);
          }

          const payload = await response.json();
          const rows = Array.isArray(payload?.rows) ? payload.rows : [];
          const row =
            rows.find((item) => Number(item?.row_index || 0) === requestedRow) ||
            rows[requestedRow - 1] ||
            null;

          if (!payload?.success || !row) {
            throw new Error("Case study row not found");
          }

          const title = row.title || "Case Study";
          const slideshowPhotos = resolveDeckPhotos(row);
          if (slideshowPhotos.length) {
            rebuildSlides(slideshowPhotos, title);
          }

          document.title = `${title} | Kaustubh Mokashi`;
          document.querySelector('meta[property="og:title"]')?.setAttribute("content", `${title} — Case Study`);
          document.querySelector('meta[name="twitter:title"]')?.setAttribute("content", `${title} — Case Study`);
        } catch (error) {
          console.error("Case study deck failed to load", error);
        } finally {
          document.body.classList.remove("is-case-study-deck-loading");
          deckLoading?.setAttribute("hidden", "");
          resizeDeck();
          bindDeckInteractions();
        }
      };

      window.addEventListener("resize", resizeDeck);
      loadCaseStudyDeck();
      })();
    </script>
