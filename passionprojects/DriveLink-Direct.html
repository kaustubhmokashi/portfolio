  <body class="page-passion">
    <a class="site-title site-title-link" href="https://www.kaustubhmokashi.com">KAUSTUBH MOKASHI</a>
    <button
      class="top-menu-toggle"
      type="button"
      aria-expanded="false"
      aria-controls="primary-menu"
      aria-label="Open menu"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>
    <nav class="top-menu" id="primary-menu" aria-label="Primary">
      <a class="top-menu-link" href="../live-products.html">Live Products</a>
      <a class="top-menu-link is-active" href="../passion-projects.html">Passion projects</a>
      <a class="top-menu-link" href="../case-studies.html">Case Studies</a>
      <a class="top-menu-link" href="../resume.html">Resume</a>
    </nav>
    <svg class="drag-guide" aria-hidden="true">
      <line class="drag-guide-line" x1="0" y1="0" x2="0" y2="0"></line>
    </svg>
    <div class="drag-guide-label" aria-hidden="true">
      <span class="drag-guide-text">dx: 0,  dy: 0</span>
    </div>
    <main class="page-shell page-shell-centered">
      <section class="page-panel page-panel-centered page-panel-passion" aria-label="DriveLink Direct">
        <p class="page-kicker">Passion Project</p>
        <h1 class="page-heading">DriveLink Direct</h1>
        <p class="drive-link-subtitle">
          Convert Google Drive share links into direct-download URLs for images and files.
        </p>

        <div class="drive-link-tool">
          <form class="drive-link-form" autocomplete="off">
            <label class="drive-link-label" for="drive-link-input">Google Drive share link</label>
            <input
              id="drive-link-input"
              class="drive-link-input"
              type="url"
              placeholder="https://drive.google.com/file/d/..."
              required
            />
            <button class="drive-link-generate" type="submit">Generate Direct Link</button>
          </form>

          <div class="drive-link-output">
            <label class="drive-link-label" for="drive-link-output">Direct download link</label>
            <div class="drive-link-output-row">
              <input
                id="drive-link-output"
                class="drive-link-input"
                type="text"
                placeholder="Direct link will appear here"
                readonly
              />
              <button class="drive-link-copy" type="button" disabled>Copy</button>
            </div>
            <p class="drive-link-helper">
              Works with standard Google Drive share links and file IDs.
            </p>
          </div>
        </div>
      </section>
    </main>
    <script src="../script.js"></script>
    <script>
      const driveInput = document.querySelector("#drive-link-input");
      const driveOutput = document.querySelector("#drive-link-output");
      const driveCopy = document.querySelector(".drive-link-copy");
      const driveForm = document.querySelector(".drive-link-form");

      const normalizeDriveLink = (value) => {
        if (!value) {
          return "";
        }
        const trimmed = value.trim();
        if (!trimmed.includes("drive.google.com")) {
          return trimmed;
        }
        if (trimmed.includes("uc?export=download&id=")) {
          return trimmed;
        }
        const fileIdMatch =
          trimmed.match(/\/file\/d\/([^/]+)/) || trimmed.match(/[?&]id=([^&]+)/);
        if (!fileIdMatch) {
          return trimmed;
        }
        const fileId = fileIdMatch[1];
        return `https://drive.google.com/uc?export=download&id=${fileId}`;
      };

      const updateCopyState = () => {
        driveCopy.disabled = !driveOutput.value;
      };

      driveForm.addEventListener("submit", (event) => {
        event.preventDefault();
        driveOutput.value = normalizeDriveLink(driveInput.value);
        updateCopyState();
      });

      driveCopy.addEventListener("click", async () => {
        if (!driveOutput.value) {
          return;
        }
        try {
          await navigator.clipboard.writeText(driveOutput.value);
          driveCopy.textContent = "Copied";
        } catch {
          driveCopy.textContent = "Copy Failed";
        }
        window.setTimeout(() => {
          driveCopy.textContent = "Copy";
        }, 1400);
      });

      updateCopyState();
    </script>
  </body>
</html>
